openapi: 3.0.3

info:
  title: ClearAI Backend API
  version: 0.2.0
  description: |
    HTTP surface of the ClearAI customs-classification backend. Source of
    truth for the Fastify route handlers in `clearai-backend/src/`. Imported
    by Azure API Management to define the public API shape.

    2026-05-12 rename cutover (commit 06c9f3d, backend rev 70):
      - /declaration-runs/*           -> /batches/*
      - /declaration-runs/:id/classifications -> /batches/:id/items
      - PATCH /declaration-runs/:id    -> POST /batches/:id/cancel
      - /declaration-runs/:id/download-links -> /batches/:id/files (no SAS)
      - /pipeline/*                    -> /classifications/*
      - /hitl/queue                    -> /classifications/review
      - POST /hitl/queue/:id/review    -> PATCH /classifications/review/:id

    Internal code/DB still use `declaration_runs` / `hitl_queue`; only the
    API surface uses the new names. See tracker/API_AUDIT_SPEC_2026-05-12.md.

    Authentication: every endpoint outside `/health` requires BOTH:
      1. A valid Microsoft Entra ID access token, validated by APIM's
         `validate-jwt` inbound policy. Audience must be the API app
         registration's AppId URI (or the app's client_id GUID as
         alternate audience). 401 if missing/invalid/expired.
      2. APIM gateway shared-secret header (`x-apim-shared-secret`),
         injected by APIM's inbound policy from the Key Vault-backed
         named value `apim-shared-secret`. APIM strips any
         client-supplied value first (anti-spoof) then re-injects from
         the named value. The Container App rejects 401 if the header
         is missing or doesn't match the env var `APIM_SHARED_SECRET`.

    Identity forwarding: the user's `Authorization: Bearer …` header is
    forwarded to the backend after validate-jwt. The backend may parse
    the JWT for audit/correlation but does NOT re-validate it (APIM has
    already done so).

    Public exception: `/health` is anonymous. APIM short-circuits with
    `{"status":"ok"}` directly — request never reaches the backend. The
    backend's own `/ready` is reachable through the protected API only,
    so it requires both auth layers like every other endpoint.

  contact:
    name: ClearAI backend team

servers:
  # APIM mounts the protected API at `path: ''` (root). Gateway URLs are
  # therefore `https://{apim}.azure-api.net/<endpoint>` with NO `/api` prefix.
  - url: https://{apim-host}
    description: Production via Azure APIM (clearai-backend, root path).
    variables:
      apim-host:
        default: apim-infp-clearai-be-dev-gwc-01.azure-api.net
  - url: http://localhost:3000
    description: Local dev (no APIM, no Entra).

tags:
  - name: probes
    description: Liveness/readiness — used by Container Apps health checks.
  - name: batches
    description: Bulk pipeline runs from uploaded xlsx/csv.
  - name: classifications
    description: Single-shot pipeline endpoints and stored traces.
  - name: review
    description: Human review queue for items the pipeline escalated.
  - name: admin
    description: Operational read endpoints for infra observability.

# -----------------------------------------------------------------------------
# Components
# -----------------------------------------------------------------------------

components:
  securitySchemes:
    apimSharedSecret:
      type: apiKey
      in: header
      name: x-apim-shared-secret
      description: |
        Shared secret injected by APIM's inbound policy. Not a user-facing
        credential; users authenticate via Entra (see `entraJwt`).
    entraJwt:
      type: oauth2
      description: |
        Microsoft Entra ID user token. Validated by APIM's `validate-jwt`
        policy before the request reaches the backend.
      flows:
        authorizationCode:
          authorizationUrl: https://login.microsoftonline.com/{tenant}/oauth2/v2.0/authorize
          tokenUrl: https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token
          scopes:
            api://clearai-backend/.default: Default access scope

  parameters:
    BatchId:
      name: id
      in: path
      required: true
      description: UUIDv7 of a batch (was declaration_run_id).
      schema:
        type: string
        format: uuid

    ReviewId:
      name: id
      in: path
      required: true
      description: UUIDv7 of a review queue row.
      schema:
        type: string
        format: uuid

  schemas:

    # ---------- shared error envelope ----------

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code (snake_case).
              example: batch_validation_failed
            message:
              type: string
              description: Human-readable explanation.
            details:
              type: object
              additionalProperties: true
              description: Optional structured detail (Zod issues, field name, etc.).

    # ---------- probes ----------

    HealthOk:
      type: object
      required: [status, db]
      properties:
        status:
          type: string
          enum: [ok, degraded]
          description: |
            `ok` only when Postgres responds AND the LLM breaker is healthy
            (not tripped, no transient-rate warning). `degraded` is returned
            with HTTP 200 — the container is still alive. Probes should not
            take the replica out of rotation on `degraded`; the signal is
            purely observability.
        db:
          type: boolean
        llm:
          type: object
          description: |
            Optional LLM circuit-breaker status surface. Present when the
            handler ran the breaker probe (always, in current implementation).
            APIM short-circuits `/health` for external callers, so this is
            visible only on the container-direct probe and in local dev.
          required: [breaker_tripped, transient_warning, transient_rate, window_size]
          properties:
            breaker_tripped:
              type: boolean
              description: |
                True after three consecutive auth-class HTTP failures
                (401/403/404). Auto-resets on the next successful call.
            transient_warning:
              type: boolean
              description: |
                True when transient_rate >= 20% over the last 20+ calls.
                Pure observability — does NOT trip the breaker. Indicates
                Foundry is slow / rate-limiting; pipeline retry + graceful
                degrade keep absorbing the errors.
            transient_rate:
              type: number
              format: float
              minimum: 0
              maximum: 1
              description: |
                Fraction of the rolling window classified as 'transient'
                (HTTP 429 / 5xx / timeout / network). 0 when window empty.
            window_size:
              type: integer
              minimum: 0
              description: |
                Number of calls in the current rolling window. Caps at
                LLM_TRANSIENT_RATE_WINDOW (default 100).

    Ready:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ready]

    NotReady:
      type: object
      required: [status, detail]
      properties:
        status:
          type: string
          enum: [warming]
        detail:
          type: string

    # ---------- batches ----------

    BatchMode:
      type: string
      enum: [classify_only, classify_and_declare]
      description: |
        `classify_only` runs Phase 1 and stops; the batch produces no XML.
        `classify_and_declare` runs Phase 1 then Phase 2 (rendered XML
        per HV item / per LV bundle). Default `classify_and_declare`.

    BatchStatus:
      type: string
      enum: [pending, running, completed, failed, cancelled]

    ClassificationPhase:
      type: string
      enum: [pending, running, completed, failed]

    DeclarationStatus:
      type: string
      nullable: true
      enum: [pending, running, completed, failed, skipped, null]

    BatchItemStatus:
      type: string
      enum: [pending, classifying, succeeded, flagged, blocked, pending_infra, failed]
      description: |
        `pending_infra` flags rows whose result was downgraded because an
        LLM-backed stage exhausted its retry budget (cleanup / sanity /
        researcher / picker / submission_description). The HITL queue UI
        filters these out by default — they typically resolve on a Foundry
        retry rather than needing a human review.

    FinalCodeSource:
      type: string
      enum: [pipeline, reviewer_override]
      description: |
        Provenance of `final_code`. Defaults to `pipeline` on insert; flips
        to `reviewer_override` after a HITL reviewer overrides via
        `PATCH /classifications/review/{id}` with decision=override.

    BatchCreated:
      type: object
      required: [batch_id, mode]
      properties:
        batch_id:
          type: string
          format: uuid
        mode:
          $ref: '#/components/schemas/BatchMode'

    BatchSummary:
      type: object
      required:
        [id, operator_slug, mode, status, classification_status, declaration_status,
         row_count, succeeded, flagged, blocked, failed, pending, pending_infra,
         started_at, completed_at, error]
      properties:
        id:
          type: string
          format: uuid
        operator_slug:
          type: string
          description: |
            The operator that owns this batch (e.g. "naqel"). Read-only;
            single-operator V1, always "naqel".
        mode:
          $ref: '#/components/schemas/BatchMode'
        status:
          $ref: '#/components/schemas/BatchStatus'
        classification_status:
          $ref: '#/components/schemas/ClassificationPhase'
        declaration_status:
          $ref: '#/components/schemas/DeclarationStatus'
        row_count:
          type: integer
          description: Total parsed rows in this batch.
        succeeded: { type: integer }
        flagged: { type: integer }
        blocked: { type: integer }
        failed: { type: integer }
        pending: { type: integer }
        pending_infra:
          type: integer
          description: |
            Rows downgraded by an LLM-stage exhaustion (graceful_degrade)
            rather than a real bad-data result. Surfaced separately so the
            HITL UI can hide infra-only failures from the reviewer queue.
        started_at:
          type: string
          nullable: true
          format: date-time
        completed_at:
          type: string
          nullable: true
          format: date-time
        error:
          type: string
          nullable: true

    LocalizedString:
      type: object
      required: [language, value]
      properties:
        language:
          type: string
          enum: [en, ar]
        value:
          type: string
          nullable: true

    DeclaredValue:
      type: object
      required: [hs_code, description, amount, currency]
      description: |
        Merchant-supplied values exactly as they appeared in the source row,
        before any FX conversion or pipeline cleanup.
      properties:
        hs_code:
          type: string
          nullable: true
          description: Merchant's HS code prefix as supplied. Null when absent or malformed.
        description:
          type: string
          nullable: true
          description: Verbatim merchant description.
        amount:
          type: number
          nullable: true
          description: Declared value in the merchant's submitted currency.
        currency:
          type: string
          nullable: true
          pattern: '^[A-Z]{3}$'
          description: ISO 4217 currency code as supplied by the merchant.

    ResolvedHsCodeDescription:
      type: object
      required: [full_hierarchy, zatca_submission_description, retrieval_query]
      properties:
        full_hierarchy:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: '#/components/schemas/LocalizedString'
          description: Bilingual catalog breadcrumb (en + ar) for the resolved HS code.
        zatca_submission_description:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: '#/components/schemas/LocalizedString'
          description: |
            LLM-generated Arabic goods description that ships in the ZATCA
            envelope. English row is null until the bilingual surface lands.
        retrieval_query:
          type: string
          nullable: true
          description: |
            Effective description used by Track A retrieval (post-cleanup /
            researcher). Lets operators see what the pipeline actually queried
            against vs. the verbatim merchant input.

    CanonicalValueAmount:
      type: object
      required: [value, currency]
      properties:
        value:
          type: number
          nullable: true
        currency:
          type: string
          nullable: true
          pattern: '^[A-Z]{3}$'

    Value:
      type: object
      required: [amount, rate, rate_as_of]
      description: |
        SAR-denominated declared value (ZATCA envelopes are SAR-only) plus
        the FX rate + as-of date used at parse time.
      properties:
        amount:
          $ref: '#/components/schemas/CanonicalValueAmount'
        rate:
          type: number
          nullable: true
          description: SAR-per-unit rate applied to the merchant's value (1 for SAR itself).
        rate_as_of:
          type: string
          nullable: true
          format: date
          description: Calendar date of the fx_rates row used for conversion (Asia/Riyadh).

    ClassificationResult:
      type: object
      required: [resolved_hs_code, classification_status, classification_confidence, sanity_verdict]
      properties:
        resolved_hs_code:
          type: string
          nullable: true
          pattern: '^\d{12}$'
          description: 12-digit code chosen by the pipeline. Null when no defensible answer.
        classification_status:
          type: string
          nullable: true
          enum: [AGREEMENT, DRIFT, ZERO_SIGNAL]
          description: V1 reconciliation outcome between the two tracks.
        classification_confidence:
          type: number
          nullable: true
          minimum: 0
          maximum: 100
          description: 0-100 score. Always null in V1 until the score work lands.
        sanity_verdict:
          type: string
          nullable: true
          enum: [PASS, FLAG, BLOCK]
          description: Stage 3 value-plausibility verdict.

    CanonicalItem:
      type: object
      required:
        - id
        - declared_value
        - resolved_hs_code_description
        - value
        - duty_info
        - procedures
        - classification_result
        - error
      description: |
        Unified per-item shape returned by /batches/{id}/items (batch listing),
        /classifications/dispatch (single-shot), and /classifications/{id}
        (single-item lookup). `row_index` is present only on batch responses;
        `trace` is present only when `?include_trace=true`. `operator_slug`
        is NOT on the item — it lives on the envelope (batch level for batch
        endpoints, response root for standalone).
      properties:
        id:
          type: string
          format: uuid
        row_index:
          type: integer
          description: 1-based row position. Batch listing only; omitted on standalone.
        declared_value:
          $ref: '#/components/schemas/DeclaredValue'
        resolved_hs_code_description:
          $ref: '#/components/schemas/ResolvedHsCodeDescription'
        value:
          $ref: '#/components/schemas/Value'
        duty_info:
          $ref: '#/components/schemas/DutyInfo'
          nullable: true
        procedures:
          type: array
          items:
            $ref: '#/components/schemas/ProcedureInfo'
        classification_result:
          $ref: '#/components/schemas/ClassificationResult'
        trace:
          type: object
          additionalProperties: true
          description: |
            Full PipelineTrace. Present only when the request included
            `?include_trace=true`; otherwise the key is omitted entirely.
        error:
          type: string
          nullable: true

    DutyInfo:
      type: object
      required: [rate_percent, status]
      description: |
        Duty information for an HS code. Exactly one of `rate_percent` / `status`
        carries data; the other is null. Returned as null at the parent level
        when the code has no duty data.
      properties:
        rate_percent:
          type: number
          nullable: true
          description: Numeric % when the row carries a rate; null when the row is a non-rate status.
        status:
          type: string
          nullable: true
          enum: [exempted, prohibited_import, prohibited_export, prohibited_both]
          description: Non-rate duty status; null when the row carries a rate.

    ProcedureInfo:
      type: object
      required: [code, description_ar, is_repealed]
      properties:
        code:
          type: string
        description_ar:
          type: string
        is_repealed:
          type: boolean
          description: True when the procedure description ends with `(ملغي)`.

    BatchItemsPage:
      type: object
      required: [batch_id, operator_slug, classification_phase, total, limit, offset, has_more, next_offset, items]
      properties:
        batch_id:
          type: string
          format: uuid
        operator_slug:
          type: string
          example: naqel
          description: |
            Operator the batch belongs to. Surfaced at envelope level
            rather than per item — applies uniformly to every row.
        classification_phase:
          $ref: '#/components/schemas/ClassificationPhase'
        total:
          type: integer
          description: Total items in the batch (across all pages).
        limit:
          type: integer
        offset:
          type: integer
        has_more:
          type: boolean
        next_offset:
          type: integer
          nullable: true
          description: Offset to pass on the next request, or null when has_more=false.
        items:
          type: array
          items:
            $ref: '#/components/schemas/CanonicalItem'

    BatchFile:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: hv/019e15e7-3e97-764f-845e-8848d7753193.xml
        size_bytes:
          type: integer
          nullable: true
        content_type:
          type: string
          nullable: true

    BatchFilesList:
      type: object
      required: [batch_id, files]
      properties:
        batch_id:
          type: string
          format: uuid
        files:
          type: array
          items:
            $ref: '#/components/schemas/BatchFile'

    # ---------- submission-description ----------

    SubmissionDescriptionBody:
      type: object
      required: [description, hs_code]
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 500
          description: Cleaned item description (English).
        hs_code:
          type: string
          pattern: '^\d{12}$'
          description: 12-digit HS code (must exist in zatca_hs_codes).

    SubmissionDescriptionResult:
      type: object
      required: [description_ar, source, latency_ms]
      properties:
        description_ar:
          type: string
          maxLength: 300
          description: ZATCA-safe Arabic description, ≤300 characters.
        source:
          type: string
          enum: [llm, llm_failed, fallback, fallback_after_collision]
        latency_ms:
          type: integer

    # ---------- single-shot classifications dispatch ----------

    DispatchBody:
      type: object
      required: [description, value_amount, currency_code]
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 500
          description: Free-text item description (English). 500-char cap matches batch row limit.
        merchant_code:
          type: string
          pattern: '^\d{6,12}$'
          description: Optional merchant-supplied HS code (6–12 digits).
        value_amount:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: Declared value (Stage 3 sanity).
        currency_code:
          type: string
          pattern: '^[A-Z]{3}$'
          description: ISO 4217 currency (e.g. SAR, USD).

    DispatchResponse:
      type: object
      required: [operator_slug, item]
      description: |
        Envelope returned by both /classifications/dispatch (single-shot)
        and /classifications/{id} (single-item lookup). The canonical item
        rides on `item`; `operator_slug` sits on the envelope because it
        applies to all operations on this tenant, not the item itself.
      properties:
        operator_slug:
          type: string
          example: naqel
        item:
          $ref: '#/components/schemas/CanonicalItem'

    # ---------- review queue ----------

    ReviewReason:
      type: string
      enum: [verdict_escalate, sanity_flag, low_information]

    ReviewStatus:
      type: string
      enum: [pending, in_review, resolved, dismissed]

    ReviewDecision:
      type: string
      enum: [approve, override, reject, block_from_submission, confirm_flag]
      description: |
        Five decision verbs:
          - approve                 — pipeline got it right; ship unchanged.
          - override                — pipeline picked wrong code; reviewer
                                      supplies a new 12-digit code. Gated
                                      below 0.60 confidence unless force=true.
          - reject                  — reviewer can't decide; dismiss the
                                      queue row, ship unchanged.
          - block_from_submission   — pull the row from the XML. reviewer_notes
                                      required (≥10 chars). reviewer_code
                                      forbidden.
          - confirm_flag            — sanity_flag-only audit signal. Reviewer
                                      agrees sanity was right about the
                                      declared value being implausible, but
                                      the row STILL ships. Records a
                                      data-quality signal against the
                                      merchant. reviewer_code forbidden.

    ReviewRow:
      type: object
      required:
        - id
        - created_at
        - enqueued_at
        - classification_event_id
        - item_id
        - batch_id
        - operator_slug
        - reason
        - status
      properties:
        id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        enqueued_at: { type: string, format: date-time }
        classification_event_id: { type: string, format: uuid }
        item_id: { type: string, format: uuid }
        batch_id:
          type: string
          format: uuid
          nullable: true
          description: Parent batch. NULL for single-shot dispatches.
        operator_slug: { type: string, example: naqel }
        reason:
          $ref: '#/components/schemas/ReviewReason'
        status:
          $ref: '#/components/schemas/ReviewStatus'
        reviewed_at: { type: string, format: date-time, nullable: true }
        reviewed_by: { type: string, nullable: true }
        reviewer_decision:
          type: string
          enum: [approve, override, reject, block_from_submission, confirm_flag]
          nullable: true
        reviewer_code:
          type: string
          pattern: '^\d{12}$'
          nullable: true
        reviewer_notes: { type: string, nullable: true }

    ReviewListPage:
      type: object
      required: [items, total, limit, offset, has_more, next_offset]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ReviewRow' }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
        has_more: { type: boolean }
        next_offset:
          type: integer
          nullable: true

    DecideBody:
      type: object
      required: [decision]
      properties:
        decision:
          $ref: '#/components/schemas/ReviewDecision'
        reviewer_code:
          type: string
          pattern: '^\d{12}$'
          description: |
            Required when decision=override. FORBIDDEN on every other
            verb (approve, reject, block_from_submission, confirm_flag).
        reviewer_notes:
          type: string
          maxLength: 2000
          description: |
            Free-form rationale. Optional for most verbs. REQUIRED and
            ≥10 chars (after trim) for decision=block_from_submission.
        force:
          type: boolean
          description: |
            Only valid for decision=override. Bypasses (a) the 0.60
            confidence gate and (b) the candidate-set constraint on
            reviewer_code. The server still verifies the code exists
            in zatca_hs_codes. Records an audit marker in reviewer_notes.

    DecideResponse:
      allOf:
        - $ref: '#/components/schemas/ReviewRow'
        - type: object
          properties:
            item_patched:
              type: object
              description: Present only when decision=override AND the queue row maps to a batch item.
              required: [item_id, previous_final_code, new_final_code, final_code_source]
              properties:
                item_id: { type: string, format: uuid }
                previous_final_code:
                  type: string
                  pattern: '^\d{12}$'
                  nullable: true
                new_final_code:
                  type: string
                  pattern: '^\d{12}$'
                final_code_source:
                  type: string
                  enum: [reviewer_override]

# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------

paths:

  # ────────────────────────────────────────────────────────────────────────
  # Probes
  # ────────────────────────────────────────────────────────────────────────

  /health:
    get:
      operationId: get-health
      tags: [probes]
      summary: Liveness probe
      description: |
        Used by Container Apps liveness checks. APIM short-circuits with a
        canned `{"status":"ok"}` so the request never reaches the backend
        (see apim.bicep — opHealthPolicy).
      security: []
      responses:
        '200':
          description: Process is alive (db field reports DB connectivity when reached directly).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthOk'

  /ready:
    get:
      operationId: get-ready
      tags: [probes]
      summary: Readiness probe
      description: |
        Returns 200 only after warmup completes (embedder loaded,
        setup_meta cached, prompts loaded). 503 + `retry-after` while
        warming.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: Ready for traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ready'
        '503':
          description: Still warming.
          headers:
            retry-after:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotReady'

  # ────────────────────────────────────────────────────────────────────────
  # Batches (was /declaration-runs)
  # ────────────────────────────────────────────────────────────────────────

  /batches:
    get:
      operationId: list-batches
      tags: [batches]
      summary: List batches with optional filters
      description: |
        Paginated list of declaration runs (batches), newest first. Returns
        slim BatchSummary rows (no per-item trace). Use `GET /batches/{id}`
        for a single run or `GET /batches/{id}/items` for its items.

        `status` accepts a comma-separated list. Valid values are the
        BatchStatus enum: `pending`, `running`, `completed`, `failed`,
        `cancelled`. Note: there is no `processing` status — use `running`.

        `created_since` / `created_until` accept ISO-8601 timestamps and
        bound the inclusive `created_at` window.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
        - name: status
          in: query
          required: false
          description: Comma-separated subset of BatchStatus values.
          schema: { type: string, example: 'running,completed' }
        - name: created_since
          in: query
          required: false
          schema: { type: string, format: date-time }
        - name: created_until
          in: query
          required: false
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Paginated list of batches.
          content:
            application/json:
              schema:
                type: object
                required: [items, total, limit, offset, has_more, next_offset]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/BatchSummary'
                  total: { type: integer }
                  limit: { type: integer }
                  offset: { type: integer }
                  has_more: { type: boolean }
                  next_offset:
                    type: integer
                    nullable: true
        '400':
          description: Invalid query (bad status value, bad date, bad pagination).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Origin access denied.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    post:
      operationId: create-batch
      tags: [batches]
      summary: Upload an xlsx/csv and start a batch
      description: |
        Multipart upload. The server validates the file extension, parses
        rows synchronously into the canonical shape, persists the batch, and
        kicks off Phase 1 (classification) in the background. Returns 202
        immediately with the batch id.

        2026-05-12 cutover: `operator_slug`, `callback_url`, `metadata`
        removed from the multipart body. Single-operator V1 ("naqel"
        hardcoded server-side).
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: '.csv or .xlsx commercial-invoice file. Max 25 MB.'
                mode:
                  $ref: '#/components/schemas/BatchMode'
      responses:
        '202':
          description: Batch accepted; processing in background.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchCreated'
        '400':
          description: Invalid body (bad file type, bad mode, etc.).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '413':
          description: |
            Upload exceeds row count limit (batch_too_large) or 25 MB file size limit.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Origin access denied (missing/invalid APIM secret in production).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /batches/{id}:
    parameters:
      - $ref: '#/components/parameters/BatchId'

    get:
      operationId: get-batch
      tags: [batches]
      summary: Batch summary
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: Batch found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchSummary'
        '404':
          description: No batch with that id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Origin access denied.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /batches/{id}/items:
    parameters:
      - $ref: '#/components/parameters/BatchId'

    get:
      operationId: get-batch-items
      tags: [batches]
      summary: Per-item classification results (paged)
      description: |
        Page of items + classification result + trace. 2026-05-12 cutover:
        added `total` / `has_more` / `next_offset` for ergonomic paging.
        `declaration_run_id` envelope key renamed to `batch_id`.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
        - name: include_trace
          in: query
          required: false
          description: When true, include the full per-item `trace` object. Off by default to keep paging cheap.
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Page of items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchItemsPage'
        '425':
          description: Phase 1 still pending or running.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: No batch with that id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /batches/{id}/cancel:
    parameters:
      - $ref: '#/components/parameters/BatchId'

    post:
      operationId: cancel-batch
      tags: [batches]
      summary: Cancel a running batch
      description: |
        Replaces the old `PATCH /declaration-runs/{id}` cancel. No body.
        Idempotent on already-cancelled. Returns 409 on already-terminal
        non-cancelled states (completed/failed).
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: Cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchSummary'
        '404':
          description: No batch with that id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Batch already in a terminal state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /batches/{id}/files:
    parameters:
      - $ref: '#/components/parameters/BatchId'

    get:
      operationId: get-batch-files
      tags: [batches]
      summary: List files produced by the batch
      description: |
        Replaces the old `/download-links` endpoint. No SAS URLs minted —
        the SPA streams each file via `/batches/{id}/files/*`. Response
        keys are snake_case (`size_bytes`, `content_type`).

        Returns 409 `no_blob_prefix` when the batch hasn't produced any
        XML output (legacy or in-flight).
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: List of files under the batch's blob prefix.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchFilesList'
        '404':
          description: No batch with that id, or no files under its prefix.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Batch has no blob output yet.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # APIM routing note: `urlTemplate` matches a SINGLE path segment per
  # `{param}` placeholder. Blob paths like `lv/<filingId>.xml` contain a
  # slash and cannot match a single template parameter, so the flat
  # `/files/{path}` operation 404s at the gateway for nested paths.
  # Backend (Fastify) uses a `*` wildcard route — `/batches/:id/files/*` —
  # which accepts any sub-path. We split into THREE explicit operations:
  # one flat (input.csv, run-index.json, classifications.json) and one
  # each for `hv/` and `lv/` nested files. All three forward to the same
  # backend route. If a new sub-folder is added (e.g. `errors/`), add a
  # matching operation here AND re-import.

  /batches/{id}/files/{path}:
    parameters:
      - $ref: '#/components/parameters/BatchId'
      - name: path
        in: path
        required: true
        description: |
          Flat file name (no slashes), one of `input.csv`, `input.xlsx`,
          `run-index.json`, `classifications.json`. For nested files
          under `hv/` or `lv/`, use the dedicated operations below.
        schema: { type: string, example: run-index.json }

    get:
      operationId: get-batch-file-flat
      tags: [batches]
      summary: Stream a flat file from a batch
      description: |
        Streams bytes through the backend. Path-traversal guard rejects
        `..`, leading `/`, and `\\`.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: File bytes (XML, JSON, CSV, or octet-stream).
          content:
            '*/*': {}
        '400':
          description: Invalid path or id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: No batch with that id, or no file at that path.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /batches/{id}/files/hv/{filing}:
    parameters:
      - $ref: '#/components/parameters/BatchId'
      - name: filing
        in: path
        required: true
        description: File name under `hv/` — typically `<filingId>.xml`.
        schema: { type: string, example: 019e15e7-3e97-764f-845e-8848d7753193.xml }

    get:
      operationId: get-batch-file-hv
      tags: [batches]
      summary: Stream an HV (high-value) declaration XML
      description: |
        High-value declarations are bundled one-per-item under `hv/`.
        Same backend handler as `get-batch-file-flat` — the split exists
        only to satisfy APIM's single-segment template-param rule.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: XML bytes.
          content:
            application/xml: {}
        '404':
          description: No batch with that id, or no HV file at that filing id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /batches/{id}/files/lv/{filing}:
    parameters:
      - $ref: '#/components/parameters/BatchId'
      - name: filing
        in: path
        required: true
        description: File name under `lv/` — typically `<filingId>.xml`.
        schema: { type: string, example: 019e15e7-3e97-764f-845e-8848d7753193.xml }

    get:
      operationId: get-batch-file-lv
      tags: [batches]
      summary: Stream an LV (low-value) declaration XML
      description: |
        Low-value declarations are bundled one-per-item under `lv/`.
        Same backend handler as `get-batch-file-flat`.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: XML bytes.
          content:
            application/xml: {}
        '404':
          description: No batch with that id, or no LV file at that filing id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ────────────────────────────────────────────────────────────────────────
  # Classifications — single-shot dispatch + stored traces (was /pipeline)
  # ────────────────────────────────────────────────────────────────────────

  /classifications/dispatch:
    post:
      operationId: dispatch-classification
      tags: [classifications]
      summary: Run the full pipeline on a single item
      description: |
        Single-shot entry to the 5-stage classification pipeline. Wraps
        the slim request into the canonical line-item shape, runs the
        orchestrator, and returns the full result + trace inline.

        2026-05-12 cutover:
          - description max 500 chars (was 2000)
          - value_amount + currency_code now REQUIRED
          - currency_code regex `/^[A-Z]{3}$/`
          - merchant_code regex `/^\d{6,12}$/`
          - operator_slug removed (single-operator V1)
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      parameters:
        - name: include_trace
          in: query
          required: false
          description: When true, include the `trace` object on the response. Off by default.
          schema: { type: boolean, default: false }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispatchBody'
      responses:
        '200':
          description: Pipeline ran. Inspect sanity_verdict for outcome.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispatchResponse'
        '400':
          description: Body invalid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Operator not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: LLM circuit breaker tripped — classification refused.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Origin access denied.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /classifications:
    get:
      operationId: list-classifications
      tags: [classifications]
      summary: List classifications across all batches
      description: |
        Paginated list of `classification_events` rows, newest first.
        Returns a slim row per classification (id, timestamp, status,
        final_code, sanity_verdict, latency). Use
        `GET /classifications/{id}` for the full envelope including trace.

        Covers both single-shot dispatches AND per-row batch
        classifications — every classification writes one row to
        classification_events regardless of entry path.

        Filters compose with AND. `status` accepts a comma-separated
        list (typical values: `ok`, `failed`). `final_code` must be the
        full 12-digit code.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
        - name: status
          in: query
          required: false
          description: Comma-separated subset of event statuses (e.g. `ok,failed`).
          schema: { type: string, example: 'ok,failed' }
        - name: operator_slug
          in: query
          required: false
          schema: { type: string, pattern: '^[a-z][a-z0-9_]{2,31}$' }
        - name: final_code
          in: query
          required: false
          description: Exact 12-digit HS code match.
          schema: { type: string, pattern: '^\d{12}$' }
      responses:
        '200':
          description: Paginated list of classification events.
          content:
            application/json:
              schema:
                type: object
                required: [items, total, limit, offset, has_more, next_offset]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [id, created_at, operator_slug, status, total_latency_ms]
                      properties:
                        id: { type: string, format: uuid }
                        created_at: { type: string, format: date-time }
                        operator_slug: { type: string }
                        status: { type: string }
                        final_code:
                          type: string
                          nullable: true
                          pattern: '^\d{12}$'
                        sanity_verdict:
                          type: string
                          nullable: true
                          enum: [PASS, FLAG, BLOCK, null]
                        total_latency_ms: { type: integer }
                  total: { type: integer }
                  limit: { type: integer }
                  offset: { type: integer }
                  has_more: { type: boolean }
                  next_offset:
                    type: integer
                    nullable: true
        '400':
          description: Invalid query.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Origin access denied.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /classifications/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: |
          classification_events.id (UUID). Most rows are UUIDv7
          (timestamp-prefixed) but the table also contains historical
          UUIDv4 rows from before the v7 migration, so the validator
          accepts any valid UUID shape.
        schema:
          type: string
          format: uuid

    get:
      operationId: get-classification
      tags: [classifications]
      summary: Fetch a stored classification by id
      description: |
        Reads a previously-classified item from `classification_events`
        (single source of truth) and returns it in the canonical item
        shape. Works for both single-shot dispatches and per-item batch
        rows. Trace is omitted by default; set `?include_trace=true` to
        include the full pipeline trace.

        Replaces the legacy `/classifications/trace/{id}` endpoint which
        used a different wire shape.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      parameters:
        - name: include_trace
          in: query
          required: false
          description: When true, include the `trace` object on the canonical item. Off by default.
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Classification found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispatchResponse'
        '400':
          description: id is not a valid UUID.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: No classification with that id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Origin access denied.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /classifications/submission-description:
    post:
      operationId: post-submission-description
      tags: [classifications]
      summary: Generate ZATCA-safe Arabic submission description
      description: |
        Stage 2.5 of the pipeline in isolation. Given a cleaned item
        description and an HS code, returns a ≤300-character Arabic
        description for the ZATCA declaration envelope.

        2026-05-12 cutover: `code` request field renamed to `hs_code`.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmissionDescriptionBody'
      responses:
        '200':
          description: Generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionDescriptionResult'
        '400':
          description: Body invalid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: HS code not in catalog.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Origin access denied.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ────────────────────────────────────────────────────────────────────────
  # Review queue (was /hitl/queue)
  # ────────────────────────────────────────────────────────────────────────

  /classifications/review:
    get:
      operationId: list-reviews
      tags: [review]
      summary: List review queue rows
      description: |
        Returns rows from the human-review queue. 2026-05-12 cutover:
        `operator_slug` filter dropped (single-operator V1); `batch_id`
        and `reason=low_information` filters added; pagination envelope
        now includes `has_more` and `next_offset`.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ReviewStatus'
        - name: reason
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ReviewReason'
        - name: batch_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Page of review rows.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewListPage'
        '400':
          description: Query validation failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /classifications/review/{id}:
    parameters:
      - $ref: '#/components/parameters/ReviewId'

    get:
      operationId: get-review
      tags: [review]
      summary: Fetch a single review row including the forensic payload
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: Review row with payload.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ReviewRow'
                  - type: object
                    required: [payload]
                    properties:
                      payload:
                        type: object
                        description: |
                          Forensic snapshot — cleaned_description,
                          verdict_output, sanity_result, full trace.
                        additionalProperties: true
        '404':
          description: No row with that id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    patch:
      operationId: decide-review
      tags: [review]
      summary: Resolve or dismiss a review row
      description: |
        Replaces the old `POST /hitl/queue/{id}/review`. Transitions
        status to 'resolved' (decision in approve | override |
        block_from_submission | confirm_flag) or 'dismissed' (decision=reject).

        Side effects per verb:
          override               atomic patch to declaration_run_items:
                                   pipeline_final_code := current final_code
                                                          (preserved if NULL)
                                   final_code         := reviewer_code
                                   final_code_source  := 'reviewer_override'
          block_from_submission  atomic patch to declaration_run_items:
                                   status            := 'blocked'
                                   excluded_from_xml := true
                                   blocked_at        := now()
                                   blocked_reason    := 'reviewer_decision'
          confirm_flag           NO side effect — queue row resolves with
                                 the verb recorded, row stays in 'flagged'
                                 status, ships in XML normally. Audit signal
                                 only. Restricted to reason='sanity_flag'.
          approve / reject       no side effects beyond the queue row.

        Returns 409 invalid_state on terminal (resolved/dismissed) rows.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecideBody'
      responses:
        '200':
          description: |
            Row updated. Response includes `item_patched` when
            decision=override, `item_blocked` when
            decision=block_from_submission, and the bare queue row
            otherwise.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecideResponse'
        '400':
          description: |
            Body invalid (e.g. override missing reviewer_code,
            block_from_submission missing or short reviewer_notes,
            reviewer_code on a forbidden verb, force=true on a
            non-override verb).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '403':
          description: |
            override_not_allowed_high_confidence — confidence ≥ 0.60
            and force=true was not passed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: No row with that id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Row is already resolved or dismissed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: |
            Decision validated against the queue row failed:
              - reviewer_code_not_in_candidates (override outside candidate
                set without force=true)
              - reviewer_code_not_in_codebook (force-override pointing at a
                non-existent or deleted HS code)
              - confirm_flag_wrong_reason (confirm_flag on a non-sanity row)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /classifications/review/{id}/claim:
    parameters:
      - $ref: '#/components/parameters/ReviewId'

    post:
      operationId: claim-review
      tags: [review]
      summary: Claim a pending review row (V2-only, not in V1 UI)
      description: |
        Transitions status from 'pending' to 'in_review'. Kept in code
        for forward-compat with V2 multi-reviewer flows; the V1 review
        UI goes straight from pending to PATCH decide. Returns 409
        invalid_state if the row is in any other status.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: Row updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReviewRow' }
        '404':
          description: No row with that id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Row is not in 'pending' status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /reference-data/currencies:
    get:
      operationId: list-currencies
      tags: [reference-data]
      summary: List available Tabadul currency codes for SPA dropdowns.
      description: |
        Returns the sorted list of ISO 4217 currency codes accepted by the
        ZATCA pipeline (i.e. rows from `tabadul_codes` with
        `code_type='currency_code'`). The list is universal (operator-agnostic)
        and reflects the live catalog, so a reseed against Tabadul's published
        sheet propagates to dropdowns on the next fetch.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: Currency list.
          content:
            application/json:
              schema:
                type: object
                required: [currencies]
                properties:
                  currencies:
                    type: array
                    items:
                      type: string
                      pattern: '^[A-Z]{3}$'
                    example: ['AED', 'EUR', 'GBP', 'SAR', 'USD']

  /reference-data/fx-rates:
    get:
      operationId: list-fx-rates
      tags: [reference-data]
      summary: Current SAR conversion rates for supported currencies.
      description: |
        Returns the most recent row per quote currency from the `fx_rates`
        table (manually seeded). SAR is the base; rate is "units of SAR per
        1 unit of quote currency". A currency missing from this response
        will be rejected at parse time with `fx_rate_missing` — ops must
        seed the rate via the maintenance CLI before that currency can be
        used in a classification.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: Current FX rate table.
          content:
            application/json:
              schema:
                type: object
                required: [base, rates]
                properties:
                  base:
                    type: string
                    enum: [SAR]
                  rates:
                    type: array
                    items:
                      type: object
                      required: [currency, sar_per_unit, as_of]
                      properties:
                        currency:
                          type: string
                          pattern: '^[A-Z]{3}$'
                        sar_per_unit:
                          type: number
                          description: e.g. 3.75 for USD (1 USD -> 3.75 SAR).
                        as_of:
                          type: string
                          format: date

  /admin/llm-call-metrics:
    get:
      operationId: get-llm-call-metrics
      tags: [admin]
      summary: Aggregated counts and latency percentiles for Foundry LLM calls.
      description: |
        Returns per-stage call counts, outcome-class rates
        (`ok`, `auth_class`, `transient`, `other`) and p50 / p95 latency
        over a rolling window. Backed by the `llm_call_metrics` table,
        which is written fire-and-forget from every `callLlm` invocation
        in the LLM transport (one row per attempt; retries are separate
        rows).

        Use this endpoint instead of reading individual trace blobs when
        answering "what's the picker transient rate over the last hour?"
        type questions.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      parameters:
        - name: since_minutes
          in: query
          required: false
          description: |
            Rolling window size in minutes. Defaults to 60. Capped at
            1440 (24h) so an accidental wide window can't trigger a long
            table scan.
          schema:
            type: integer
            minimum: 1
            maximum: 1440
            default: 60
        - name: stage
          in: query
          required: false
          description: |
            Optional stage filter — one of the `LlmStage` values
            (`cleanup`, `researcher_cheap`, `researcher_web`, `picker`,
            `code_resolver`, `reconciliation`, `submission_description`,
            `sanity`). When omitted, all stages are returned.
          schema:
            type: string
            maxLength: 64
      responses:
        '200':
          description: Aggregated metrics for the requested window.
          content:
            application/json:
              schema:
                type: object
                required: [since, until, total_calls, by_stage]
                properties:
                  since:
                    type: string
                    format: date-time
                  until:
                    type: string
                    format: date-time
                  total_calls:
                    type: integer
                    description: Sum of `calls` across all stages in the window.
                  by_stage:
                    type: object
                    additionalProperties:
                      type: object
                      required:
                        - calls
                        - ok_rate
                        - auth_class_rate
                        - transient_rate
                        - other_rate
                        - p50_latency_ms
                        - p95_latency_ms
                      properties:
                        calls:
                          type: integer
                        ok_rate:
                          type: number
                          minimum: 0
                          maximum: 1
                        auth_class_rate:
                          type: number
                          minimum: 0
                          maximum: 1
                        transient_rate:
                          type: number
                          minimum: 0
                          maximum: 1
                        other_rate:
                          type: number
                          minimum: 0
                          maximum: 1
                        p50_latency_ms:
                          type: integer
                          nullable: true
                        p95_latency_ms:
                          type: integer
                          nullable: true
        '400':
          description: Query validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

# Default security applied at the operation level above; this default keeps
# probes wide-open via `security: []` overrides.
security:
  - apimSharedSecret: []
    entraJwt: ['api://clearai-backend/.default']

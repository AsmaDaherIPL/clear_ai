openapi: 3.0.3

info:
  title: ClearAI Backend API
  version: 0.1.0
  description: |
    HTTP surface of the ClearAI customs-classification backend. Source of
    truth for the Fastify route handlers in `clearai-backend/src/`. Imported
    by Azure API Management to define the public API shape.

    Authentication: every endpoint outside `/health` requires BOTH:
      1. A valid Microsoft Entra ID access token, validated by APIM's
         `validate-jwt` inbound policy. Audience must be the API app
         registration's AppId URI (or the app's client_id GUID as
         alternate audience). 401 if missing/invalid/expired.
      2. APIM gateway shared-secret header (`x-apim-shared-secret`),
         injected by APIM's inbound policy from the Key Vault-backed
         named value `apim-shared-secret`. APIM strips any
         client-supplied value first (anti-spoof) then re-injects from
         the named value. The Container App rejects 401 if the header
         is missing or doesn't match the env var `APIM_SHARED_SECRET`.

    Identity forwarding: the user's `Authorization: Bearer …` header is
    forwarded to the backend after validate-jwt. The backend may parse
    the JWT for audit/correlation but does NOT re-validate it (APIM has
    already done so). New endpoints that need user identity (e.g.
    "who created this declaration_run?") read claims from the forwarded
    Authorization header. Today's existing /classifications/* endpoints
    don't read it.

    Public exception: `/health` is anonymous. APIM short-circuits with
    `{"status":"ok"}` directly — request never reaches the backend. The
    backend's own `/ready` is reachable through the protected API only,
    so it requires both auth layers like every other endpoint.

  contact:
    name: ClearAI backend team

servers:
  # APIM mounts the protected API at `path: ''` (root). Gateway URLs are
  # therefore `https://{apim}.azure-api.net/<endpoint>` with NO `/api` prefix.
  - url: https://{apim-host}
    description: Production via Azure APIM (clearai-backend, root path).
    variables:
      apim-host:
        default: apim-infp-clearai-be-dev-gwc-01.azure-api.net
  - url: http://localhost:3000
    description: Local dev (no APIM, no Entra).

tags:
  - name: probes
    description: Liveness/readiness — used by Container Apps health checks.
  - name: declaration-runs
    description: Bulk pipeline runs from uploaded xlsx/csv.
  - name: pipeline
    description: Single-shot pipeline endpoints.
  - name: hitl
    description: Human-in-the-loop review queue for items the pipeline escalated.

# -----------------------------------------------------------------------------
# Components
# -----------------------------------------------------------------------------

components:
  securitySchemes:
    apimSharedSecret:
      type: apiKey
      in: header
      name: x-apim-shared-secret
      description: |
        Shared secret injected by APIM's inbound policy. Not a user-facing
        credential; users authenticate via Entra (see `entraJwt`).
    entraJwt:
      type: oauth2
      description: |
        Microsoft Entra ID user token. Validated by APIM's `validate-jwt`
        policy before the request reaches the backend.
      flows:
        authorizationCode:
          authorizationUrl: https://login.microsoftonline.com/{tenant}/oauth2/v2.0/authorize
          tokenUrl: https://login.microsoftonline.com/{tenant}/oauth2/v2.0/token
          scopes:
            api://clearai-backend/.default: Default access scope

  parameters:
    DeclarationRunId:
      name: id
      in: path
      required: true
      description: UUID of a declaration run.
      schema:
        type: string
        format: uuid

  schemas:

    # ---------- shared error envelope ----------

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code (snake_case).
              example: declaration_run_validation_failed
            message:
              type: string
              description: Human-readable explanation.
            details:
              type: object
              additionalProperties: true
              description: Optional structured detail (Zod issues, field name, etc.).

    # ---------- probes ----------

    HealthOk:
      type: object
      required: [status, db]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        db:
          type: boolean

    Ready:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ready]

    NotReady:
      type: object
      required: [status, detail]
      properties:
        status:
          type: string
          enum: [warming]
        detail:
          type: string

    # ---------- declaration-runs ----------

    DeclarationRunMode:
      type: string
      enum: [classify_only, classify_and_declare]
      description: |
        `classify_only` runs Phase 1 and stops; the run produces no XML.
        `classify_and_declare` runs Phase 1 then Phase 2 (rendered XML
        per HV item / per LV bundle). Default `classify_and_declare`.

    DeclarationRunStatus:
      type: string
      enum: [pending, running, completed, failed, cancelled]

    ClassificationStatus:
      type: string
      enum: [pending, running, completed, failed]

    DeclarationStatus:
      type: string
      nullable: true
      enum: [pending, running, completed, failed, skipped, null]

    DeclarationRunItemStatus:
      type: string
      enum: [pending, classifying, succeeded, flagged, blocked, failed]

    DeclarationRunCreated:
      type: object
      required: [declaration_run_id, mode, poll_url, classifications_url]
      properties:
        declaration_run_id:
          type: string
          format: uuid
        mode:
          $ref: '#/components/schemas/DeclarationRunMode'
        poll_url:
          type: string
          example: /declaration-runs/{id}
        classifications_url:
          type: string
          example: /declaration-runs/{id}/classifications
        declarations_url:
          type: string
          description: Present only when mode=classify_and_declare.
          example: /declaration-runs/{id}/declarations

    DeclarationRunSummary:
      type: object
      required:
        [id, operator_slug, mode, status, classification_status, declaration_status,
         row_count, succeeded, flagged, blocked, failed, pending,
         started_at, completed_at, error]
      properties:
        id:
          type: string
          format: uuid
        operator_slug:
          type: string
          description: |
            The operator that owns this run (e.g. "naqel"). Read-only;
            assigned at creation time from the `operator_slug` form field.
        mode:
          $ref: '#/components/schemas/DeclarationRunMode'
        status:
          $ref: '#/components/schemas/DeclarationRunStatus'
        classification_status:
          $ref: '#/components/schemas/ClassificationStatus'
        declaration_status:
          $ref: '#/components/schemas/DeclarationStatus'
        row_count:
          type: integer
          description: Total parsed rows in this run.
        succeeded: { type: integer }
        flagged: { type: integer }
        blocked: { type: integer }
        failed: { type: integer }
        pending: { type: integer }
        started_at:
          type: string
          nullable: true
          format: date-time
        completed_at:
          type: string
          nullable: true
          format: date-time
        error:
          type: string
          nullable: true

    DeclarationRunItem:
      type: object
      required: [id, row_index, status, final_code, classification_result, trace, error]
      properties:
        id:
          type: string
          format: uuid
        row_index:
          type: integer
        status:
          $ref: '#/components/schemas/DeclarationRunItemStatus'
        final_code:
          type: string
          nullable: true
          pattern: '^\d{12}$'
          description: 12-digit ZATCA HS code, present when status=succeeded|flagged.
        catalog_path_en:
          type: string
          nullable: true
          description: ZATCA breadcrumb in English (zatca_hs_code_display.path_en) for the chosen final_code. Null when there's no final_code.
        submission_description_ar:
          type: string
          nullable: true
          description: LLM-generated Arabic goods description that ships in the XML envelope. Null when there's no final_code.
        classification_result:
          type: object
          nullable: true
          additionalProperties: true
        trace:
          type: object
          nullable: true
          additionalProperties: true
          description: Full PipelineTrace (all stage outputs).
        error:
          type: string
          nullable: true

    DeclarationRunClassifications:
      type: object
      required: [declaration_run_id, items]
      properties:
        declaration_run_id:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: '#/components/schemas/DeclarationRunItem'

    PatchDeclarationRunBody:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [cancelled]
          description: Only `cancelled` is permitted.

    PatchDeclarationRunResult:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [cancelled]

    # ---------- submission-description ----------

    SubmissionDescriptionBody:
      type: object
      required: [description, code]
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 2000
          description: Cleaned item description (English).
        code:
          type: string
          pattern: '^\d{12}$'
          description: 12-digit HS code (must exist in zatca_hs_codes).

    SubmissionDescriptionResult:
      type: object
      required: [description_ar, source, latency_ms]
      properties:
        description_ar:
          type: string
          maxLength: 300
          description: ZATCA-safe Arabic description, ≤300 characters.
        source:
          type: string
          enum: [llm, llm_failed, fallback, fallback_after_collision]
        latency_ms:
          type: integer

    # ---------- pipeline single-shot dispatch ----------

    DispatchBody:
      type: object
      required: [description]
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 2000
          description: Free-text item description (English).
        merchant_code:
          type: string
          description: |
            Optional merchant-supplied HS code. The pipeline auto-detects
            shape (12-digit, short prefix, malformed, absent). Accepts any
            string; non-digits are stripped.
        operator_slug:
          type: string
          pattern: '^[a-z][a-z0-9_]{2,31}$'
          default: naqel
          description: Owning operator. Defaults to 'naqel'.
        value_amount:
          type: number
          minimum: 0.01
          description: Optional declared value (for Stage 3 sanity).
        currency_code:
          type: string
          minLength: 3
          maxLength: 3
          description: ISO 4217 currency. Required if value_amount is set.

    PipelineDispatchResult:
      type: object
      required: [item_id, operator_slug, sanity_verdict, trace]
      properties:
        item_id:
          type: string
          format: uuid
          description: Synthesised id for this single-shot dispatch (not persisted).
        operator_slug:
          type: string
        final_code:
          type: string
          nullable: true
          pattern: '^\d{12}$'
          description: Null when the pipeline rejected the item (sanity_verdict=BLOCK).
        goods_description_ar:
          type: string
          nullable: true
          maxLength: 300
          description: ZATCA-safe Arabic from Stage 2.5. Null when rejected.
        sanity_verdict:
          type: string
          enum: [PASS, FLAG, BLOCK]
        trace:
          type: object
          additionalProperties: true
          description: Full PipelineTrace (signal_count, track_a, track_b, verdict, sanity, stages[]).

    # ---------- pipeline trace lookup ----------

    PipelineTraceResult:
      type: object
      required: [item_id, declaration_run_id, status, final_code, trace]
      properties:
        item_id:
          type: string
          format: uuid
        declaration_run_id:
          type: string
          format: uuid
          description: Parent run that produced this trace.
        status:
          type: string
          enum: [pending, classifying, succeeded, flagged, blocked, failed]
        final_code:
          type: string
          nullable: true
          pattern: '^\d{12}$'
        classification_result:
          type: object
          nullable: true
          additionalProperties: true
        trace:
          type: object
          nullable: true
          additionalProperties: true
        error:
          type: string
          nullable: true

    # ---------- alt error shape (legacy) ----------

    SimpleError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: invalid_body
        detail:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true

    # ---------- HITL queue ----------

    HitlRow:
      type: object
      required:
        - id
        - created_at
        - enqueued_at
        - classification_event_id
        - item_id
        - operator_slug
        - reason
        - status
      properties:
        id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        enqueued_at: { type: string, format: date-time }
        classification_event_id: { type: string, format: uuid }
        item_id: { type: string, format: uuid }
        operator_slug: { type: string, example: naqel }
        reason:
          type: string
          enum: [verdict_escalate, sanity_flag]
        status:
          type: string
          enum: [pending, in_review, resolved, dismissed]
        reviewed_at: { type: string, format: date-time, nullable: true }
        reviewed_by: { type: string, nullable: true }
        reviewer_decision:
          type: string
          enum: [approve, override, reject]
          nullable: true
        reviewer_code:
          type: string
          pattern: '^\d{12}$'
          nullable: true
        reviewer_notes: { type: string, nullable: true }

# -----------------------------------------------------------------------------
# Paths
# -----------------------------------------------------------------------------

paths:

  # ────────────────────────────────────────────────────────────────────────
  # Probes (no auth)
  # ────────────────────────────────────────────────────────────────────────

  /health:
    get:
      operationId: get-health
      tags: [probes]
      summary: Liveness probe
      description: |
        Used by Container Apps liveness checks. Always returns 200; the
        body's `db` field flips to false if Postgres is unreachable.
      security: []
      responses:
        '200':
          description: Process is alive (db field reports DB connectivity).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthOk'

  /ready:
    get:
      operationId: get-ready
      tags: [probes]
      summary: Readiness probe
      description: |
        Returns 200 only after warmup completes (embedder loaded,
        setup_meta cached, prompts loaded). 503 + `retry-after` while
        warming. Used by Container Apps to gate traffic routing.
      security: []
      responses:
        '200':
          description: Ready for traffic.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ready'
        '503':
          description: Still warming.
          headers:
            retry-after:
              schema: { type: integer }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotReady'

  # ────────────────────────────────────────────────────────────────────────
  # Declaration runs
  # ────────────────────────────────────────────────────────────────────────

  /declaration-runs:
    post:
      operationId: post-declaration-runs
      tags: [declaration-runs]
      summary: Upload an xlsx/csv and start a declaration run
      description: |
        Multipart upload. The server validates the file extension, parses
        rows synchronously into the canonical shape, persists the run, and
        kicks off Phase 1 (classification) in the background. Returns 202
        immediately with poll URLs.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, operator_slug]
              properties:
                file:
                  type: string
                  format: binary
                  description: '.csv or .xlsx commercial-invoice file. Max 25 MB.'
                operator_slug:
                  type: string
                  pattern: '^[a-z][a-z0-9_]{2,31}$'
                  description: Owning operator (e.g. "naqel").
                mode:
                  $ref: '#/components/schemas/DeclarationRunMode'
                callback_url:
                  type: string
                  format: uri
                  description: Optional webhook target stored in metadata.
                metadata:
                  type: string
                  description: |
                    Optional JSON-encoded object. Merged into the run's
                    metadata field.
      responses:
        '202':
          description: Run accepted; processing in background.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeclarationRunCreated'
        '400':
          description: Invalid body (bad file type, bad operator_slug, bad metadata, etc.).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Operator slug not in registry.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '413':
          description: |
            Upload exceeds row count limit (declaration_run_too_large)
            or 25 MB file size limit.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Origin access denied (missing/invalid APIM secret in production).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /declaration-runs/{id}:
    parameters:
      - $ref: '#/components/parameters/DeclarationRunId'

    get:
      operationId: get-declaration-runs-id
      tags: [declaration-runs]
      summary: Run summary
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: Run found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeclarationRunSummary'
        '404':
          description: No run with that id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Origin access denied.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    patch:
      operationId: patch-declaration-runs-id
      tags: [declaration-runs]
      summary: Cancel a running declaration run
      description: 'Body must be `{ "status": "cancelled" }`. Idempotent on already-cancelled.'
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchDeclarationRunBody'
      responses:
        '200':
          description: Cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatchDeclarationRunResult'
        '400':
          description: Body shape invalid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: No run with that id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Run already in a terminal state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /declaration-runs/{id}/classifications:
    parameters:
      - $ref: '#/components/parameters/DeclarationRunId'

    get:
      operationId: get-declaration-runs-id-classifications
      tags: [declaration-runs]
      summary: Per-item classification results
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: All items in the run, with classification results + trace.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeclarationRunClassifications'
        '425':
          description: Phase 1 still pending or running.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: No run with that id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /declaration-runs/{id}/download-links:
    parameters:
      - $ref: '#/components/parameters/DeclarationRunId'

    get:
      operationId: get-declaration-runs-id-download-links
      tags: [declaration-runs]
      summary: Short-lived download URLs for all files produced by the run
      description: |
        Lists every blob under the run's prefix and returns a
        user-delegation SAS URL for each. URLs are valid for 5 minutes;
        the SPA should start downloads or zip them client-side promptly.
        Returns 409 no_blob_prefix when the run has not yet produced any
        XML output (legacy or in-flight runs).
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: List of short-lived SAS URLs, one per file.
          content:
            application/json:
              schema:
                type: object
                required: [runId, expiresAt, files]
                properties:
                  runId: { type: string, format: uuid }
                  expiresAt: { type: string, format: date-time }
                  files:
                    type: array
                    items:
                      type: object
                      required: [name, url]
                      properties:
                        name: { type: string, example: hv/filing-001.xml }
                        url: { type: string, format: uri }
                        sizeBytes: { type: integer, nullable: true }
                        contentType: { type: string, nullable: true }
        '404':
          description: No run with that id, or no files under its prefix.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Run has no blob output yet.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # NOTE on routing: APIM operation `urlTemplate`s match a SINGLE path
  # segment per `{param}` placeholder. A blob path like `lv/<filingId>.xml`
  # contains a slash, so it cannot match a single template parameter and
  # the original `/files/{path}` operation 404'd at the gateway before
  # ever hitting the backend.
  #
  # Backend (Fastify) uses a `*` wildcard route — `/declaration-runs/:id/files/*` —
  # which accepts any sub-path. To keep APIM and Fastify in agreement we
  # split into THREE explicit operations: one flat (input.csv,
  # run-index.json, classifications.json) and one each for the `hv/` and
  # `lv/` nested files. All three forward to the same backend route.
  # Historical pre-rename batches have `manifest.json` instead of
  # `run-index.json` at the same path — both names resolve via the
  # backend's read-side fallback.
  #
  # If you add a new sub-folder (e.g. `errors/`, `logs/`) under a run
  # prefix, you must add a matching APIM operation here AND re-import,
  # or callers will get a gateway-level 404. RFC-6570 `{+path}` reserved-
  # string expansion is NOT supported by APIM Consumption — verified
  # 2026-05-11 via direct PATCH against the operation urlTemplate.

  /declaration-runs/{id}/files/{path}:
    parameters:
      - $ref: '#/components/parameters/DeclarationRunId'
      - name: path
        in: path
        required: true
        description: |
          Flat file name (no slashes), one of `input.csv`, `input.xlsx`,
          `run-index.json`, `classifications.json`. For nested files
          under `hv/` or `lv/`, use the dedicated operations below.
          Historical (pre-rename) batches accept `manifest.json` in place
          of `run-index.json`.
        schema: { type: string, example: run-index.json }

    get:
      operationId: get-declaration-runs-id-files
      tags: [declaration-runs]
      summary: Stream a flat file (run-index/classifications/input) from a run
      description: |
        Convenience endpoint for previewing a single top-level run file.
        Streams bytes through the backend rather than handing out a SAS;
        prefer /download-links for bulk fetches.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: File bytes (XML, JSON, or octet-stream).
          content:
            '*/*': {}
        '404':
          description: No run with that id, or no file at that path.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /declaration-runs/{id}/files/hv/{filing}:
    parameters:
      - $ref: '#/components/parameters/DeclarationRunId'
      - name: filing
        in: path
        required: true
        description: File name under `hv/` — typically `<filingId>.xml`.
        schema: { type: string, example: 019e15e7-3e97-764f-845e-8848d7753193.xml }

    get:
      operationId: get-declaration-runs-id-files-hv
      tags: [declaration-runs]
      summary: Stream an HV (high-value) declaration XML from a run
      description: |
        High-value declarations are bundled one-per-item under `hv/`.
        Same backend handler as the flat-file operation above — the split
        exists only to satisfy APIM's single-segment template-param rule.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: XML bytes.
          content:
            application/xml: {}
        '404':
          description: No run with that id, or no HV file at that filing id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /declaration-runs/{id}/files/lv/{filing}:
    parameters:
      - $ref: '#/components/parameters/DeclarationRunId'
      - name: filing
        in: path
        required: true
        description: File name under `lv/` — typically `<filingId>.xml`.
        schema: { type: string, example: 019e15e7-3e97-764f-845e-8848d7753193.xml }

    get:
      operationId: get-declaration-runs-id-files-lv
      tags: [declaration-runs]
      summary: Stream an LV (low-value) declaration XML from a run
      description: |
        Low-value declarations are bundled one-per-item under `lv/`.
        Same backend handler as the flat-file operation above — the split
        exists only to satisfy APIM's single-segment template-param rule.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: XML bytes.
          content:
            application/xml: {}
        '404':
          description: No run with that id, or no LV file at that filing id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ────────────────────────────────────────────────────────────────────────
  # Pipeline single-shot
  # ────────────────────────────────────────────────────────────────────────

  /pipeline/submission-description:
    post:
      operationId: post-pipeline-submission-description
      tags: [pipeline]
      summary: Generate ZATCA-safe Arabic submission description
      description: |
        Stage 2.5 of the pipeline in isolation. Given a cleaned item
        description and an HS code, returns a ≤300-character Arabic
        description for the ZATCA declaration envelope. Catalog leaf
        Arabic + path Arabic are looked up server-side from
        zatca_hs_codes/zatca_hs_code_display.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmissionDescriptionBody'
      responses:
        '200':
          description: Generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmissionDescriptionResult'
        '400':
          description: Body invalid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleError' }
        '404':
          description: HS code not in catalog.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SimpleError' }
        '401':
          description: Origin access denied.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /pipeline/dispatch:
    post:
      operationId: post-pipeline-dispatch
      tags: [pipeline]
      summary: Run the full pipeline on a single item
      description: |
        Single-shot entry to the 5-stage classification pipeline. Wraps a
        slim request body into the canonical line-item shape, runs the
        orchestrator, and returns the full result + trace inline. No
        server-side persistence — the SPA can stash the trace client-side
        if it needs to revisit. Bulk classification uses /declaration-runs.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DispatchBody'
      responses:
        '200':
          description: Pipeline ran. Inspect sanity_verdict for outcome.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineDispatchResult'
        '400':
          description: Body invalid.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Operator slug unknown.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Origin access denied.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /pipeline/trace/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: declaration_run_items.id (UUID).
        schema:
          type: string
          format: uuid

    get:
      operationId: get-pipeline-trace-id
      tags: [pipeline]
      summary: Fetch a stored pipeline trace
      description: |
        Reads a previously-classified item from declaration_run_items.
        Returns its trace + classification result. Use this when the SPA
        wants to revisit a result from a bulk run, or when /pipeline/dispatch
        was followed by a separate page-load that needs the trace again.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: Trace found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineTraceResult'
        '400':
          description: id is not a valid UUID.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: No item with that id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401':
          description: Origin access denied.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ────────────────────────────────────────────────────────────────────────
  # HITL queue
  # ────────────────────────────────────────────────────────────────────────

  /hitl/queue:
    get:
      operationId: get-hitl-queue
      tags: [hitl]
      summary: List HITL review rows
      description: |
        Returns rows from the human-in-the-loop queue, optionally filtered
        by status and operator_slug. Default page size 50, max 200.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, in_review, resolved, dismissed]
        - name: operator_slug
          in: query
          required: false
          schema: { type: string, pattern: '^[a-z][a-z0-9_]{2,31}$' }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Page of HITL rows.
          content:
            application/json:
              schema:
                type: object
                required: [items, total, limit, offset]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/HitlRow' }
                  total: { type: integer }
                  limit: { type: integer }
                  offset: { type: integer }
        '400':
          description: Query validation failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /hitl/queue/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      operationId: get-hitl-queue-id
      tags: [hitl]
      summary: Fetch a single HITL row including the forensic payload
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: HITL row with payload.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/HitlRow'
                  - type: object
                    required: [payload]
                    properties:
                      payload:
                        type: object
                        description: |
                          Forensic snapshot — cleaned_description,
                          verdict_output, sanity_result, full trace.
                        additionalProperties: true
        '404':
          description: No row with that id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /hitl/queue/{id}/claim:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    post:
      operationId: post-hitl-queue-id-claim
      tags: [hitl]
      summary: Claim a pending HITL row for review
      description: |
        Transitions status from 'pending' to 'in_review'. Returns 409
        invalid_state if the row is in any other status.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      responses:
        '200':
          description: Row updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HitlRow' }
        '404':
          description: No row with that id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Row is not in 'pending' status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /hitl/queue/{id}/review:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }

    post:
      operationId: post-hitl-queue-id-review
      tags: [hitl]
      summary: Resolve or dismiss a HITL row
      description: |
        Transitions status to 'resolved' (decision=approve|override) or
        'dismissed' (decision=reject). decision='override' requires
        reviewer_code (12 digits). Idempotent on terminal rows: returns
        409 invalid_state.
      security:
        - apimSharedSecret: []
          entraJwt: ['api://clearai-backend/.default']
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [approve, override, reject]
                reviewer_code:
                  type: string
                  pattern: '^\d{12}$'
                  description: Required when decision='override'.
                reviewer_notes:
                  type: string
                  maxLength: 2000
      responses:
        '200':
          description: Row updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HitlRow' }
        '400':
          description: Body invalid, or override missing reviewer_code.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: No row with that id.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Row is already resolved or dismissed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

# Default security applied at the operation level above; this default keeps
# probes wide-open via `security: []` overrides.
security:
  - apimSharedSecret: []
    entraJwt: ['api://clearai-backend/.default']

<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1540" viewBox="0 0 1800 1540" role="img" aria-labelledby="title desc">
  <title id="title">ClearAI Dispatch Pipeline - Design D</title>
  <desc id="desc">Uniform core pipeline with evidence-aware reconciliation for HS-code dispatch.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 46px; font-weight: 750; fill: #0f172a; }
      .subtitle { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 22px; fill: #475569; }
      .label { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; fill: #64748b; }
      .h1 { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 29px; font-weight: 750; fill: #111827; }
      .h2 { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 22px; font-weight: 750; fill: #111827; }
      .body { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 18px; fill: #334155; }
      .small { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 15px; fill: #475569; }
      .tiny { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 13px; fill: #64748b; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 15px; fill: #1e293b; }
      .mono-light { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 14px; fill: #e2e8f0; }
      .card { stroke-width: 2; rx: 18; filter: url(#shadow); }
      .det { fill: #f1f5f9; stroke: #94a3b8; }
      .llm { fill: #f5f3ff; stroke: #7c3aed; }
      .db { fill: #ecfeff; stroke: #0891b2; }
      .warn { fill: #fff7ed; stroke: #f97316; }
      .danger { fill: #fef2f2; stroke: #dc2626; }
      .ok { fill: #ecfdf5; stroke: #16a34a; }
      .principle { fill: #eef2ff; stroke: #6366f1; }
      .dark { fill: #0f172a; stroke: #1e293b; }
      .line { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .line-purple { stroke: #7c3aed; stroke-width: 3.5; fill: none; marker-end: url(#arrow-purple); }
      .line-soft { stroke: #94a3b8; stroke-width: 2.2; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 7; }
      .chip-text { font-family: Inter, "Segoe UI", Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #334155; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1540"/>

  <text class="title" x="70" y="82">Design D: Uniform Core + Evidence-Aware Reconciliation</text>
  <text class="subtitle" x="72" y="122">Every item receives the same core scrutiny. Merchant data is evidence, not a trust shortcut.</text>

  <rect class="card principle" x="1180" y="46" width="550" height="155" rx="20"/>
  <text class="label" x="1210" y="86" fill="#4f46e5">Core principle</text>
  <text class="body" x="1210" y="121">
    <tspan x="1210" dy="0">Do not route items into different scrutiny levels.</tspan>
    <tspan x="1210" dy="27">Run the same framework for every item, then</tspan>
    <tspan x="1210" dy="27">use deterministic sub-decisions where judgment</tspan>
    <tspan x="1210" dy="27">is not required.</tspan>
  </text>

  <!-- Input -->
  <ellipse cx="210" cy="282" rx="138" ry="74" fill="#cffafe" stroke="#0891b2" stroke-width="3" filter="url(#shadow)"/>
  <text class="h2" x="128" y="270">Invoice Line</text>
  <text class="small" x="112" y="301">description, code, value</text>
  <text class="small" x="132" y="324">qty, weight, origin</text>

  <!-- Stage 0 -->
  <rect class="card det" x="430" y="215" width="360" height="160"/>
  <text class="label" x="462" y="250">Stage 0 - no LLM</text>
  <text class="h2" x="462" y="286">Normalize Input</text>
  <text class="body" x="462" y="321">
    <tspan x="462" dy="0">Parse fields, strip code punctuation,</tspan>
    <tspan x="462" dy="25">standardize nulls and numeric values.</tspan>
  </text>

  <!-- Stage 1 -->
  <rect class="card det" x="870" y="215" width="520" height="205"/>
  <text class="label" x="904" y="250">Stage 1 - no LLM - DB lookup</text>
  <text class="h2" x="904" y="286">Code Evidence Validation</text>
  <text class="body" x="904" y="321">
    <tspan x="904" dy="0">Classify merchant code shape and catalog status.</tspan>
    <tspan x="904" dy="25">This is a signal only. It never accepts the item.</tspan>
  </text>
  <g>
    <rect x="904" y="350" width="112" height="34" rx="17" fill="#dcfce7" stroke="#16a34a"/>
    <text class="chip-text" x="926" y="372">ACTIVE_12</text>
    <rect x="1028" y="350" width="116" height="34" rx="17" fill="#fee2e2" stroke="#dc2626"/>
    <text class="chip-text" x="1048" y="372">DELETED_12</text>
    <rect x="1156" y="350" width="132" height="34" rx="17" fill="#fef3c7" stroke="#d97706"/>
    <text class="chip-text" x="1175" y="372">PARTIAL_PREFIX</text>
    <rect x="904" y="392" width="178" height="34" rx="17" fill="#e2e8f0" stroke="#64748b"/>
    <text class="chip-text" x="922" y="414">UNKNOWN_OR_MALFORMED</text>
    <rect x="1094" y="392" width="82" height="34" rx="17" fill="#f8fafc" stroke="#64748b"/>
    <text class="chip-text" x="1116" y="414">NONE</text>
  </g>

  <path class="line" d="M348,282 C375,282 400,282 425,282"/>
  <path class="line" d="M790,282 C820,282 840,282 865,282"/>

  <!-- Stage 2 -->
  <rect class="card llm" x="270" y="520" width="590" height="230"/>
  <text class="label" x="305" y="558" fill="#6d28d9">Stage 2 - LLM always runs</text>
  <text class="h1" x="305" y="600">Blind Classification</text>
  <text class="body" x="305" y="636">
    <tspan x="305" dy="0">Classifier sees description, value, currency, qty,</tspan>
    <tspan x="305" dy="26">weight, and origin.</tspan>
    <tspan x="305" dy="32" font-weight="700">Classifier does NOT see merchant_code.</tspan>
  </text>
  <rect class="dark" x="560" y="608" width="260" height="105" rx="12"/>
  <text class="mono-light" x="582" y="635">blind_result = {</text>
  <text class="mono-light" x="598" y="660">code, alternatives,</text>
  <text class="mono-light" x="598" y="685">confidence, rationale</text>
  <text class="mono-light" x="582" y="710">}</text>

  <!-- Evidence note -->
  <rect class="card db" x="945" y="538" width="410" height="150"/>
  <text class="label" x="975" y="574">Merchant evidence</text>
  <text class="body" x="975" y="610">
    <tspan x="975" dy="0">Validated code status, replacement codes,</tspan>
    <tspan x="975" dy="26">or prefix candidate set flow into</tspan>
    <tspan x="975" dy="26">reconciliation as evidence.</tspan>
  </text>

  <path class="line-purple" d="M1130,420 C1115,470 1075,500 1048,535"/>
  <path class="line-purple" d="M610,375 C570,425 560,470 560,516"/>

  <!-- Stage 3 reconciliation -->
  <rect class="card llm" x="130" y="825" width="1540" height="380"/>
  <text class="label" x="170" y="866" fill="#6d28d9">Stage 3 - evidence-aware reconciliation</text>
  <text class="h1" x="170" y="909">Reconcile Blind Result With Merchant Evidence</text>
  <text class="body" x="170" y="943">Same framework for every item. Extra LLM call only when semantic judgment is needed.</text>

  <g>
    <rect class="ok" x="170" y="980" width="315" height="150" rx="16"/>
    <text class="h2" x="196" y="1015">A. Match</text>
    <text class="small" x="196" y="1047">
      <tspan x="196" dy="0">blind_code == active merchant code</tspan>
      <tspan x="196" dy="22">or deleted replacement hit</tspan>
      <tspan x="196" dy="28" font-weight="700">No extra LLM. final_code = blind.</tspan>
    </text>

    <rect class="warn" x="510" y="980" width="315" height="150" rx="16"/>
    <text class="h2" x="536" y="1015">B. Nearby Leaf</text>
    <text class="small" x="536" y="1047">
      <tspan x="536" dy="0">same chapter/heading, different leaf</tspan>
      <tspan x="536" dy="28" font-weight="700">LLM arbitrate.</tspan>
      <tspan x="536" dy="22">Pick the better defensible code.</tspan>
    </text>

    <rect class="danger" x="850" y="980" width="315" height="150" rx="16"/>
    <text class="h2" x="876" y="1015">C. Cross-Chapter</text>
    <text class="small" x="876" y="1047">
      <tspan x="876" dy="0">blind and merchant disagree structurally</tspan>
      <tspan x="876" dy="28" font-weight="700">LLM investigate.</tspan>
      <tspan x="876" dy="22">Treat as suspicious until explained.</tspan>
    </text>

    <rect fill="#eff6ff" stroke="#2563eb" stroke-width="2" x="1190" y="980" width="315" height="150" rx="16"/>
    <text class="h2" x="1216" y="1015">D. Partial Prefix</text>
    <text class="small" x="1216" y="1047">
      <tspan x="1216" dy="0">if blind starts with prefix: accept blind</tspan>
      <tspan x="1216" dy="24">else: LLM expand under prefix</tspan>
      <tspan x="1216" dy="26" font-weight="700">0 or 1 extra LLM.</tspan>
    </text>

    <rect fill="#f8fafc" stroke="#64748b" stroke-width="2" x="338" y="1148" width="420" height="42" rx="21"/>
    <text class="small" x="362" y="1175">E. No code / invalid code: accept blind as only classification opinion</text>

    <rect fill="#f8fafc" stroke="#64748b" stroke-width="2" x="790" y="1148" width="440" height="42" rx="21"/>
    <text class="small" x="814" y="1175">Output: reconciled_code, reconciliation verdict, rationale, LLM count</text>
  </g>

  <path class="line-purple" d="M565,750 C565,790 610,808 665,825"/>
  <path class="line-purple" d="M1150,688 C1165,750 1095,798 1015,825"/>

  <!-- Stage 4 and 5 -->
  <rect class="card det" x="345" y="1265" width="420" height="145"/>
  <text class="label" x="378" y="1302">Stage 4 - no LLM - DB lookup</text>
  <text class="h2" x="378" y="1338">Tenant Override</text>
  <text class="body" x="378" y="1372">
    <tspan x="378" dy="0">Apply DB-backed tenant remap after</tspan>
    <tspan x="378" dy="25">reconciliation. Usually no-op.</tspan>
  </text>

  <rect class="card danger" x="960" y="1260" width="540" height="155"/>
  <text class="label" x="995" y="1298" fill="#b91c1c">Stage 5 - LLM always runs - fraud catcher</text>
  <text class="h1" x="995" y="1338">Sanity Check</text>
  <text class="body" x="995" y="1375">
    <tspan x="995" dy="0">Check final_code + description + value + currency</tspan>
    <tspan x="995" dy="25">+ qty + weight + origin for plausibility.</tspan>
  </text>

  <path class="line" d="M900,1205 C820,1242 715,1255 610,1263"/>
  <path class="line" d="M765,1338 C830,1338 890,1338 955,1338"/>

  <!-- Outcomes -->
  <g>
    <ellipse cx="700" cy="1460" rx="185" ry="48" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text class="h2" x="667" y="1453" fill="#166534">PASS</text>
    <text class="small" x="590" y="1478" fill="#166534">safe for Declaration XML</text>

    <ellipse cx="1145" cy="1460" rx="205" ry="48" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text class="h2" x="1114" y="1453" fill="#92400e">FLAG</text>
    <text class="small" x="1012" y="1478" fill="#92400e">emit XML with reviewRequired=true</text>

    <ellipse cx="1545" cy="1460" rx="185" ry="48" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text class="h2" x="1505" y="1453" fill="#991b1b">BLOCK</text>
    <text class="small" x="1435" y="1478" fill="#991b1b">send to human review queue</text>
  </g>

  <path class="line" d="M1225,1415 C1150,1430 1090,1440 845,1454"/>
  <path class="line" d="M1230,1415 C1230,1435 1200,1447 1185,1454"/>
  <path class="line" d="M1295,1415 C1375,1436 1455,1446 1500,1454"/>

  <!-- Budget side note -->
  <rect class="card principle" x="1415" y="245" width="315" height="300" rx="18"/>
  <text class="label" x="1442" y="282" fill="#4f46e5">LLM call budget</text>
  <text class="body" x="1442" y="319">
    <tspan x="1442" dy="0" font-weight="700">Guaranteed:</tspan>
    <tspan x="1442" dy="26">2 calls per item</tspan>
    <tspan x="1442" dy="27">- blind classify</tspan>
    <tspan x="1442" dy="24">- sanity check</tspan>
    <tspan x="1442" dy="35" font-weight="700">Conditional:</tspan>
    <tspan x="1442" dy="26">+1 call for arbitration,</tspan>
    <tspan x="1442" dy="24">investigation, or expansion.</tspan>
  </text>

  <!-- Footer -->
  <text class="tiny" x="70" y="1484">ClearAI dispatch design: accuracy first, deterministic where structurally knowable, LLM where semantic judgment is required.</text>
</svg>

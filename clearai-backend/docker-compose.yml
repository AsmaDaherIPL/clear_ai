services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: clearai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clearai
      POSTGRES_PASSWORD: clearai
      POSTGRES_DB: clearai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearai -d clearai"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:

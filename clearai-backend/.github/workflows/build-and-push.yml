name: Build & push backend image to GHCR

# Triggered when backend code (or this workflow) changes on main, plus a
# manual `workflow_dispatch` for ad-hoc rebuilds. Path filter is scoped to
# clearai-backend/** so frontend or wiki changes don't burn build minutes.
on:
  push:
    branches: [main]
    paths:
      - 'clearai-backend/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch:

# Only one image build at a time per ref; cancel older runs of the same ref
# so a quick succession of pushes doesn't stack up minutes.
concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # 2-segment image path — GHCR enforces lowercase. Owner is the GitHub user
  # `asmadaheripl`; image name matches the on-disk directory.
  IMAGE_NAME: asmadaheripl/clearai-backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # GITHUB_TOKEN needs `packages: write` to push to GHCR. Repo-level
      # setting (Settings → Actions → General → Workflow permissions) must
      # also be set to "Read and write permissions" for this to take effect.
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tags emitted:
          #   latest                 (only on default branch)
          #   sha-<7-char SHA>       (every build — used for rollback / audit)
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./clearai-backend
          file: ./clearai-backend/Dockerfile
          # linux/amd64 only — Container Apps runs amd64. ARM build adds
          # ~5 min per push and we have no consumers for it.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub's built-in cache backend so layer reuse survives
          # across runs and across branches.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## Pushed image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tags:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pull with:" >> $GITHUB_STEP_SUMMARY
          echo '```sh' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

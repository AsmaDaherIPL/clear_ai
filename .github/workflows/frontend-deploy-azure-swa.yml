name: Deploy frontend to Azure Static Web Apps

# ---------------------------------------------------------------------------
# WHY THIS FILE EXISTS (and why the Cloudflare workflow still exists too)
#
# We are migrating the ClearAI frontend from Cloudflare Pages to Azure Static
# Web Apps so all project infrastructure lives in one Azure subscription
# (sub-infp-clearai-nonprod-gwc / 6e9d19dc-...). The Cloudflare workflow
# (frontend-deploy-cloudflare.yml) is intentionally NOT deleted here. It stays
# alive as a rollback safety net — the Cloudflare Pages site remains live
# during the cutover window. Cleanup (delete Cloudflare project, old workflow,
# old Cloudflare GH secrets, remove the old origin from CORS) is a separate
# follow-up task after the user has verified this SWA deployment is healthy.
#
# WHY WE BUILD IN CI, NOT IN SWA'S ORYX ENGINE
#
# Azure Static Web Apps can auto-build with its built-in Oryx build agent.
# We deliberately skip that (skip_app_build: true) and build here instead,
# because Astro reads PUBLIC_* variables at BUILD TIME via Vite's
# import.meta.env — they get statically inlined into the JS bundle. Oryx
# runs in Azure's sandbox and cannot see GitHub Actions secrets, so
# PUBLIC_CLEARAI_API_KEY would resolve to undefined and the deployed bundle
# would fail to call the backend. Building in CI where GITHUB_ACTIONS secrets
# ARE available is the correct pattern for Vite/Astro PUBLIC_* injection.
# (Pages Functions / Azure Functions to proxy the key server-side are deferred
# to a future v1.5 milestone per the existing ADR.)
#
# WHY BOTH ORIGINS MUST BE IN APIM + CONTAINER APP CORS
#
# CORS is locked at three layers: APIM <allowed-origins>, Container App
# CORS_ORIGINS env var, and (implicitly) the deployed origin. During cutover,
# BOTH https://clearai-frontend.pages.dev AND https://yellow-glacier-05e43ee03.7.azurestaticapps.net
# must appear in all three CORS allow-lists. When a custom domain is added
# later (separate task), that domain must also be appended — the
# *.azurestaticapps.net auto-hostname alone is not sufficient at that point.
# ---------------------------------------------------------------------------

# Scoped to clearai-frontend/** so backend or wiki pushes don't trigger
# a frontend redeploy. Keep this workflow at the REPO ROOT — Actions only
# discovers .github/workflows/ at the top level, never inside subfolders.
on:
  push:
    branches: [main]
    paths:
      - 'clearai-frontend/**'
      - '.github/workflows/frontend-deploy-azure-swa.yml'
  workflow_dispatch:

permissions:
  contents: read
  # id-token: write is required if we ever add OIDC-based Azure login;
  # included now so the permission block is correct from the start.
  id-token: write
  # pull-requests: write lets the SWA GitHub Action post a preview-URL
  # comment on PRs (staging environment feature). Harmless on push-to-main.
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clearai-frontend/package-lock.json

      - name: Install dependencies
        working-directory: clearai-frontend
        run: npm ci

      # Build the static SPA bundle.
      #
      # The PUBLIC_* env vars below are injected at BUILD TIME by Vite/Astro
      # (import.meta.env.PUBLIC_*) and inlined into the final JS bundle. They
      # are NOT secrets — every value is already discoverable in the deployed
      # SPA's network traffic (Entra tenant id, client id, API audience, APIM
      # gateway URL). They are stored as GitHub Actions repository VARIABLES
      # (not Secrets) at: repo settings → Actions → Variables.
      #
      # If a value changes (new tenant, new APIM gateway, new app reg), update
      # the repo variable in the GitHub UI — no code edit required.
      #
      # Architecture context: as of 2026-05-05, the SPA does its own auth via
      # MSAL.js (Authorization Code + PKCE) and calls APIM directly with the
      # user's access token. The SWA-managed-Functions BFF is being removed in
      # a follow-up; the BFF build/deploy steps below remain for one revision
      # to keep the api_location surface populated until the cleanup commit.
      - name: Build SPA
        working-directory: clearai-frontend
        env:
          PUBLIC_ENTRA_TENANT_ID: ${{ vars.PUBLIC_ENTRA_TENANT_ID }}
          PUBLIC_ENTRA_CLIENT_ID: ${{ vars.PUBLIC_ENTRA_CLIENT_ID }}
          PUBLIC_ENTRA_API_SCOPE: ${{ vars.PUBLIC_ENTRA_API_SCOPE }}
          PUBLIC_APIM_BASE_URL: ${{ vars.PUBLIC_APIM_BASE_URL }}
        run: npm run build

      # Build the BFF Function. This compiles api/src/**/*.ts to api/dist/.
      # SWA's deploy action picks up api/ as the api_location and ships its
      # compiled output as a managed-function sidecar.
      - name: Install BFF deps
        working-directory: clearai-frontend/api
        run: npm ci

      - name: Build BFF
        working-directory: clearai-frontend/api
        run: npm run build

      # Deploys the pre-built dist/ + the BFF api/ to Azure Static Web Apps.
      #
      # api_location: clearai-frontend/api  → SWA picks up the Function code
      #                                        as a managed-function sidecar.
      #                                        It MUST contain host.json +
      #                                        package.json at the root (it
      #                                        does — see api/host.json).
      # skip_app_build: true                → don't run Oryx's SPA build
      #                                        (we already built above).
      # skip_api_build: true                → don't run Oryx's API build
      #                                        either (we tsc'd above);
      #                                        Oryx would otherwise discard
      #                                        api/dist and rebuild from
      #                                        api/src, which is fine but
      #                                        wastes time.
      #
      # Required SWA Application Settings (Configuration blade) — set BEFORE
      # the first deploy, otherwise the BFF returns 500 bff_misconfigured:
      #   APIM_BASE_URL          (plain)
      #   ENTRA_TENANT_ID        (plain — your Workforce tenant id)
      #   ENTRA_CLIENT_ID        (plain — infp-clearai-web-bff-dev-01 client_id)
      #   ENTRA_CLIENT_SECRET    (Key Vault reference recommended:
      #                           @Microsoft.KeyVault(SecretUri=https://kv-infp-clearai-dev-gwc.vault.azure.net/secrets/entra-bff-client-secret/))
      #   ENTRA_API_SCOPE        (api://infp-clearai-api-dev-01/.default)
      #   BFF_MAX_REQUEST_BYTES  (262144)
      #   BFF_FORWARD_SUB_KEY    (false — we dropped APIM subscriptionRequired)
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "clearai-frontend/dist"
          api_location: "clearai-frontend/api"
          skip_app_build: true
          skip_api_build: true
          output_location: ""

name: Deploy wiki to Cloudflare Pages

# Scoped to clearai-wiki/** so backend or frontend pushes don't trigger
# a wiki redeploy. Keep this workflow at the REPO ROOT — Actions only
# discovers .github/workflows/ at the top level, never inside subfolders.
on:
  push:
    branches: [main]
    paths:
      - 'clearai-wiki/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clearai-wiki/package-lock.json

      - name: Install dependencies
        working-directory: clearai-wiki
        run: npm ci

      - name: Build
        working-directory: clearai-wiki
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy clearai-wiki/dist --project-name=clearai --branch=main
